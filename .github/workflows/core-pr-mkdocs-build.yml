name: General - PR MkDocs Build

on:
  workflow_call:
    inputs:
      mkdocs_repo:
        required: true
        type: string
      docs_repo:
        required: true
        type: string
      docs_checkout:
        required: true
        type: string
      root_dir:
        required: false
        type: string
        default: ""
      python_version:
        required: false
        type: string
        default: "3.10.12"
      requirements_path:
        required: false
        type: string
        default: "requirements.txt"
      workflows_repo:
        required: false
        type: string
        default: "papermoonio/workflows"

permissions:
  contents: read

jobs:
  authorize-caller:
    uses: ./.github/workflows/core-authorize-caller.yml
    
  build-mkdocs:
    needs: authorize-caller
    runs-on: ubuntu-latest
    steps:
      - name: Set up workflow variables
        id: vars
        run: |
          echo "mkdocs_repo_name=$(basename '${{ inputs.mkdocs_repo }}')" >> $GITHUB_OUTPUT
          echo "docs_repo_name=$(basename '${{ inputs.docs_repo }}')" >> $GITHUB_OUTPUT
          echo "docs_checkout_path=$(basename '${{ inputs.docs_checkout }}')" >> $GITHUB_OUTPUT

      # Checkout mkdocs skeleton 
      - name: Checkout MkDocs Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.mkdocs_repo }}
          path: ${{ steps.vars.outputs.mkdocs_repo_name }}
          fetch-depth: 0
          persist-credentials: false

      # Checkout docs content at the PR HEAD 
      - name: Checkout Docs Repo into MkDocs
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || inputs.docs_repo }}
          ref: ${{ github.event.pull_request.head.sha || 'refs/heads/main' }}
          path: ${{ steps.vars.outputs.mkdocs_repo_name }}/${{ steps.vars.outputs.docs_checkout_path }}
          fetch-depth: 0
          persist-credentials: false

      # Checkout workflows repo to avoid raw.githubusercontent.com rate limits
      - name: Checkout Workflows Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.workflows_repo }}
          path: workflows-repo
          persist-credentials: false

      # Replace remote URL reference with local path to avoid 429 rate limits
      - name: Use local workflows requirements
        working-directory: ${{ steps.vars.outputs.mkdocs_repo_name }}
        env:
          REQ_PATH: ${{ inputs.requirements_path }}
          WORKFLOWS_REPO: ${{ inputs.workflows_repo }}
        run: |
          if ! echo "$WORKFLOWS_REPO" | grep -qE '^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$'; then
            echo "::error::Invalid workflows_repo format: must be 'owner/repo'"
            exit 1
          fi
          LOCAL_REQ="${GITHUB_WORKSPACE}/workflows-repo/requirements.txt"
          REMOTE_PREFIX="https://raw.githubusercontent.com/${WORKFLOWS_REPO}/"
          if grep -qF "$REMOTE_PREFIX" "$REQ_PATH" 2>/dev/null; then
            python3 -c "import sys,re; p,prefix,l=sys.argv[1:4]; c=open(p).read(); n=re.sub(r'-r\s+'+re.escape(prefix)+r'\S*requirements\.txt','-r '+l,c); open(p,'w').write(n); print('Replaced' if c!=n else 'No match found')" "$REQ_PATH" "$REMOTE_PREFIX" "$LOCAL_REQ"
          else
            echo "No remote workflows URL found in $REQ_PATH, skipping replacement"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: |
            ${{ steps.vars.outputs.mkdocs_repo_name }}/${{ inputs.requirements_path }}
            workflows-repo/requirements.txt

      - name: Install dependencies
        working-directory: ${{ steps.vars.outputs.mkdocs_repo_name }}
        run: |
          python -V
          pip install --upgrade pip
          pip install -r "${{ inputs.requirements_path }}"

      - name: Build MkDocs site
        working-directory: ${{ steps.vars.outputs.mkdocs_repo_name }}
        run: mkdocs build -d "site${{ inputs.root_dir }}"
